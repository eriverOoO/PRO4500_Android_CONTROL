name: Build Release Artifacts

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-phone-apk:
    name: Build phone debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android/StructuredLightPhoneCamera

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Stage APK for upload
        run: |
          mkdir -p ../../dist
          cp app/build/outputs/apk/debug/app-debug.apk ../../dist/StructuredLightPhoneCamera-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StructuredLightPhoneCamera-debug-apk
          path: dist/StructuredLightPhoneCamera-debug.apk
          if-no-files-found: error

  build-control-panel:
    name: Build Windows control panel
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Build StructuredLightControlPanel.exe
        shell: cmd
        run: build_native_control_panel.bat

      - name: Stage control panel artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\StructuredLightControlPanel | Out-Null
          Copy-Item -Force StructuredLightControlPanel.exe dist\StructuredLightControlPanel\StructuredLightControlPanel.exe

      - name: Upload control panel artifact
        uses: actions/upload-artifact@v4
        with:
          name: StructuredLightControlPanel-windows-exe
          path: dist/StructuredLightControlPanel/StructuredLightControlPanel.exe
          if-no-files-found: error
