name: Build Android APK

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-phone-apk:
    name: Build phone debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android/StructuredLightPhoneCamera

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Stage APK for upload
        run: |
          mkdir -p ../../dist
          cp app/build/outputs/apk/debug/app-debug.apk ../../dist/StructuredLightPhoneCamera-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StructuredLightPhoneCamera-debug-apk
          path: dist/StructuredLightPhoneCamera-debug.apk
          if-no-files-found: error
